# ======================== 输入输出 ========================
# 输入：完整实体有限元网格，不带孔。
# 需要你先在 Abaqus / HyperMesh / Gmsh 里把 STEP 划分成实体网格并导出 inp。
input_inp: "input/Job-1.inp"

# 输出：删除孔洞区域单元之后的多孔有限元模型。
output_inp: "output/job-1_model.inp"

# 孔洞中心、孔径表和报告。
output_pores_csv: "output/pore_parameters.csv"
output_report_json: "output/report.json"
output_distribution_png: "output/pore_size_distribution.png"

# ======================== 随机参数 ========================
random_seed: 20240625

# ======================== 孔隙率与孔径 ========================
# 目标删除单元体积分数。由于按单元中心删除，是近似孔隙率。
target_porosity: 0.40
porosity_tolerance: 0.02

# 孔径单位必须和 inp 节点坐标单位一致，例如 mm。
min_pore_diameter: 0.5
max_pore_diameter: 1

# 最大孔数量和采样次数，防止无限循环。
max_pore_count: 9000000
max_sampling_attempts: 9000000

# ======================== 孔洞形状 ========================
# sphere 或 ellipsoid
hole_shape: "irregular"

# irregular 时使用：
# irregularity_strength 控制孔边界不规则程度。
# 0 表示接近球形；0.15~0.35 是比较稳的范围；太大可能出现局部细碎单元。
irregularity_strength: 0.25

# irregularity_modes 控制边界起伏复杂度。
# 数值越大，边界越复杂；一般 3~6 即可。
irregularity_modes: 4

# 椭球缩放，仅 hole_shape=ellipsoid 时使用。
ellipsoid_scale_range:
  x: [0.8, 1.3]
  y: [0.8, 1.3]
  z: [0.8, 1.3]

# ======================== 孔洞重叠与连通 ========================
# true：孔洞可以重叠；false：孔洞之间不允许重叠。
allow_overlap: true

# overlap_factor 越大，允许孔中心越接近，重叠越明显。
overlap_factor: 0.8

# free：随机孔，不要求所有孔连通。
# connected：新孔必须和已有孔重叠，形成连通孔网络。
connectivity_mode: "free"

# ======================== 网格删除控制 ========================
# centroid：只要单元中心落入孔洞就删除，最快。
delete_rule: "centroid"

# 是否删除没有任何单元使用的孤立节点。
remove_unused_nodes: true

# 是否在输出 inp 里增加新的 ELSET。
write_removed_element_set: false
write_remaining_element_set: false

# ======================== 空间分区并行删单元 ========================
# true：把“单元中心是否落入孔洞”的计算拆成多个空间分区并行处理。
# 注意：拆分的是计算任务，不是真的把 inp 模型切成多个小模型。
use_domain_parallel: true

# 将单元中心包围盒划分为 nx × ny × nz 个空间子区域。
domain_split:
  nx: 5
  ny: 5
  nz: 5

# 并行进程数。通常设置为 CPU 物理核心数或略小于物理核心数。
num_workers: 8

# 调试用：是否输出每个分区删除的单元编号。
# 大模型一般保持 false，避免生成大量文本文件。
debug_write_partition_deleted_ids: false
